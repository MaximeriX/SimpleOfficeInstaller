<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-src 'none'">
  <title>Simple Office Installer</title>
  <script src="assets/js/boot.js"></script>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" href="icon.ico">
</head>

<body>
  <nav>
    <img src="icon.ico" alt="" class="icon">
    <p>Simple Office Installer</p>
    <div class="nav-actions">
      <button class="theme-toggle" type="button" title="Toggle theme" data-i18n-title="nav.themeToggle">
        <svg class="theme-icon" data-lucide="sun" stroke-width="2.5"></svg>
      </button>
      <div class="select nav-language">
        <select class="language-select" aria-label="Language" data-i18n-aria-label="ui.languageLabel">
          <option value="en_us">English</option>
        </select>
        <button class="select-button lang-select-button" type="button" title="Toggle language" aria-label="Toggle language"
          aria-haspopup="listbox" aria-expanded="false">
          <span class="lang-button-face" aria-hidden="true">
            <svg data-lucide="languages" class="lang-button-icon"></svg>
          </span>
          <img src="assets/icons/flags/en_us.svg" alt="English" class="flag-icon">
          <span class="select-value">English</span>
          <svg data-lucide="chevron-down" class="select-chevron"></svg>
        </button>
        <div class="select-menu" role="listbox"></div>
      </div>
      <button class="window-minimize" type="button" title="Minimize" data-i18n-title="nav.minimize">
        <svg data-lucide="minus"></svg>
      </button>
      <button class="window-close" type="button" title="Close" data-i18n-title="nav.close">
        <svg data-lucide="x"></svg>
      </button>
    </div>
  </nav>

  <main>
    <div class="main-content">
    <section class="form-section office-version">
      <div class="field office-version">
        <label for="version">
          <svg class="label-icon office-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 278050 333334">
            <path d="M278050 305556l-29-16V28627L178807 0 448 66971l-448 87 22 200227 60865-23821V80555l117920-28193-17 239519L122 267285l178668 65976v73l99231-27462v-316z" />
          </svg>
          <span data-i18n="form.officeVersion">Office Version</span>
        </label>
        <div class="select">
          <select id="version">
            <option value="" disabled selected>-- Select --</option>
            <option value="office-365">Office 365</option>
            <option value="office-2024">Office 2024</option>
            <option value="office-2021">Office 2021</option>
            <option value="office-2019">Office 2019</option>
            <option value="office-2016">Office 2016</option>
          </select>
          <button class="select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="select-value">-- Select --</span>
            <svg data-lucide="chevron-down" class="select-chevron"></svg>
          </button>
          <div class="select-menu" role="listbox"></div>
        </div>
      </div>

      <div class="field edition">
        <label for="edition">
          <svg data-lucide="pencil"></svg>
          <span data-i18n="form.edition">Edition</span>
          <svg class="label-info" data-lucide="info" data-tooltip="VL - Volume License&#10;RL - Retail License" data-i18n-tooltip="form.infoEdition"></svg>
        </label>
        <div class="select">
          <select id="edition" disabled>
            <option value="" disabled selected>-- Select --</option>
          </select>
          <button class="select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="select-value">-- Select --</span>
            <svg data-lucide="chevron-down" class="select-chevron"></svg>
          </button>
          <div class="select-menu" role="listbox"></div>
        </div>
      </div>
    </section>

    <section class="form-section apps">
      <div class="field apps">
        <label>
          <svg data-lucide="grid-3x3"></svg>
          <span data-i18n="form.apps">Apps</span>
        </label>
        <div class="app-grid" id="apps">
          <div class="app-list">
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="access" disabled><img
                src="assets/icons/office/2019/access.svg" data-office-icon="access" alt=""><span>Access</span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="excel" disabled><img
                src="assets/icons/office/2019/excel.svg" data-office-icon="excel" alt=""><span>Excel</span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="groove" disabled><span class="app-entry-tooltip"
                data-tooltip="OneDrive for Business" data-i18n-tooltip="options.grooveTooltip"><img
                src="assets/icons/office/default/groove.png" data-office-icon="groove" alt=""><span>Groove</span></span></label>
            <label><input type="checkbox"
                class="checkbox app-checkbox" data-app="lync" disabled><span class="app-entry-tooltip"
                data-tooltip="Skype for Business" data-i18n-tooltip="options.lyncTooltip"><img src="assets/icons/office/2019/lync.svg" data-office-icon="lync"
                alt=""><span>Lync</span></span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="onedrive" disabled><img
                src="assets/icons/office/default/onedrive.svg" data-office-icon="onedrive" alt=""><span>OneDrive</span></label>

            <label><input type="checkbox" class="checkbox app-checkbox" data-app="outlook" disabled><img
                src="assets/icons/office/2019/outlook.svg" data-office-icon="outlook" alt=""><span>Outlook</span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="powerpoint" disabled><img
                src="assets/icons/office/2019/powerpoint.svg" data-office-icon="powerpoint" alt=""><span>PowerPoint</span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="publisher" disabled><img

            <label><input type="checkbox" class="checkbox app-checkbox" data-app="project" disabled><img
                src="assets/icons/office/2019/project.svg" data-office-icon="project" alt=""><span>Project</span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="teams" disabled><img
                src="assets/icons/office/default/teams.svg" data-office-icon="teams" alt=""><span>Teams</span></label>
            <label><input type="checkbox" class="checkbox app-checkbox" data-app="visio" disabled><img

                src="assets/icons/office/2019/word.svg" data-office-icon="word" alt=""><span>Word</span></label>
